name: Preisdaten aktualisieren

# Fährt alle produktiven Scraper, normalisiert und schreibt die Preishistorie
# fort, dann committet die Action die aktualisierten Datendateien zurück.
#
# Voraussetzung: Repo liegt auf GitHub. Unter Settings → Actions → General muss
# "Workflow permissions" auf "Read and write" stehen (oder das permissions-Feld
# unten genügt), damit der Push zurück ins Repo funktioniert.

on:
  schedule:
    - cron: '0 5 * * 1' # jeden Montag 05:00 UTC (neue Wochenprospekte)
  workflow_dispatch:
    inputs:
      aldi_sued_slug:
        description: 'Aldi-Süd-Prospekt-Slug (z. B. kw30-26-op-mp) – leer lassen, um Aldi Süd zu überspringen'
        required: false
        default: ''

permissions:
  contents: write

# Verhindert überlappende Läufe (Push-Konflikte); wartet lieber, statt abzubrechen.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scraper-Abhängigkeiten installieren
        working-directory: scrapers
        run: npm ci

      - name: Chromium für Playwright installieren
        working-directory: scrapers
        run: npx playwright install --with-deps chromium

      - name: Scraper + Normalisierung ausführen
        working-directory: scrapers
        env:
          ALDI_SUED_SLUG: ${{ github.event.inputs.aldi_sued_slug }}
        run: node run-all.js

      - name: Aktualisierte Daten committen
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/offers.json src/data/price-history.json scrapers/captured
          if git diff --cached --quiet; then
            echo 'Keine Datenänderungen – nichts zu committen.'
          else
            git commit -m 'chore(data): Preisdaten & -historie aktualisiert'
            git push
          fi

      # Bestpreis-Alarm: erkennt neue Preistiefs (aus der frisch geschriebenen
      # price-history.json) und mailt die bestätigten Abos an. Ohne die Secrets
      # läuft ein Trockenlauf; fehlende Alarme dürfen den Datenlauf nicht kippen,
      # daher continue-on-error (die wichtigen Daten sind oben schon committet).
      # web-push (für den Push-Kanal) als Laufzeit-Dependency installieren.
      - name: Alarm-Abhängigkeiten installieren
        run: npm ci --omit=dev

      - name: Bestpreis-Alarme versenden
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          API_BASE: ${{ vars.API_BASE }}
        run: node scripts/send-alarms.mjs
