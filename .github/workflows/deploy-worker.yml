name: Worker deployen

# Wendet D1-Migrationen an und deployt den Cloudflare Worker (Alarm-API).
# Läuft bei Änderungen unter worker/ auf main sowie manuell.
#
# Voraussetzungen (Repo-Secrets): CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Die echte D1 database_id muss in worker/wrangler.toml eingetragen sein.
# Details siehe DEPLOY.md.

on:
  push:
    branches: [main]
    paths: ['worker/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Abhängigkeiten
        working-directory: worker
        run: npm ci

      - name: D1-Migrationen anwenden
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: d1 migrations apply findmyenergy --remote

      - name: Worker deployen
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
